          <div class="field" style="width: 100%;">
            <label class="label has-text-centered">Nombre del Usuario</label>
            <div class="control">
              <input class="input is-primary"
              type="text"
              placeholder="Ingrese nombre">
            </div>
          </div>

        </div>

      </div>

      <div class="column is-8">

        <div class="box-formulario">

          <h2 class="title2">
            Ventas
          </h2>

          <div class="field">
            <label class="label">Fecha</label>
            <div class="control">
              <input class="input is-info" type="date">
            </div>
          </div>

          <div class="field">
            <label class="label">Ingresos</label>
            <div class="control">
              <input class="input is-success"
              type="text"
              placeholder="Ingrese ingresos">
            </div>
          </div>

          <div class="field">
            <label class="label">Egresos</label>
            <div class="control">
              <input class="input is-danger"
              type="text"
              placeholder="Ingrese egresos">
            </div>
          </div>

          <div class="field">
            <label class="label">Concepto</label>
            <div class="control">
              <textarea class="textarea is-warning"
              placeholder="Ingrese el concepto"></textarea>
            </div>
          </div>

          <div class="field">
            <label class="label">Valor</label>
            <div class="control">
              <input class="input is-link"
              type="number"
              placeholder="Ingrese valor">
            </div>
          </div>

          <div class="field mt-5">
            <div class="control">
              <button class="button is-primary is-medium">
                Guardar
              </button>

          <div class="field mt-5">
            <div class="control">
              <a class="button is-primary is-medium" href="../index.html">
                volver al inicio
              </a>
            </div>
          </div>

        </div>

      </div>

    </div>
