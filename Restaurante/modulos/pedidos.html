<!DOCTYPE html>
<html lang="en">
<head>
<link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
<link href="../css/pedido.css" rel="stylesheet">

    <title>Pedidos</title>
</head>
<body> 
    <section class="section">
        <div class="container">
            <h1 class="title">Formulario de Pedido</h1>
            <form id="pedidoForm">
                <div class="field">
                    <label class="label">Producto</label>
                    <div class="control">
                        <input class="input" type="text" id="producto" placeholder="Ingrese el producto" required>
                    </div>
                </div>

                <div class="field">
                    <label class="label">Dirección</label>
                    <div class="control">
                        <textarea class="textarea" id="direccion" placeholder="Ingrese su dirección" required></textarea>
                    </div>
                </div>

                <div class="field">
                    <label class="label">Nombre de Usuario</label>
                    <div class="control">
                        <input class="input" type="text" id="nombreUsuario" placeholder="Ingrese su nombre" required>
                    </div>
                </div>

                <div class="field">
                    <label class="label">Cantidad</label>
                    <div class="control">
                        <input class="input" type="number" id="cantidad" placeholder="Ingrese la cantidad" min="1" required>
                    </div>
                </div>

                <div class="field">
                    <label class="label">Método de Pago</label>
                    <div class="control">
                        <div class="select">
                            <select id="metodoPago" required>
                                <option value="">Seleccione un método</option>
                                <option value="efectivo">Efectivo</option>
                                <option value="tarjeta">bancolombia</option>
                                <option value="transferencia">nequi</option>
                                <option value="tarjeta">davivienda</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="field">
                    <label class="label">Teléfono</label>
                    <div class="control">
                        <input class="input" type="tel" id="telefono" placeholder="Ingrese su teléfono" required>
                    </div>
                </div>

                <div class="field">
                    <div class="control">
                        <button class="button is-primary" type="submit">Enviar Pedido</button>
                    </div>
                </div>
            </form>
        </div>
    </section>

    
</body>
</html>
