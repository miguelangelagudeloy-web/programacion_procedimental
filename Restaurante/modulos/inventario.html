<!doctype html>
<html lang="en">

<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css" />
    <title>Document</title>
    <style>
        body {
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f5f5;
        }

        .form-box {
            width: 320px;
            padding: 25px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>
    <div class="form-box">
        <div class="field"> <label class="label">Codigo del producto</label>
            <div class="control"> <input class="input" type="text" placeholder="Codigo" /> </div>
        </div>
        <div class="field"> <label class="label">Nombre del producto</label>
            <div class="control"> <input class="input" type="text" placeholder="Nombre" /> </div>
        </div>
        <div class="field"> <label class="label">Cantidad de productos</label>
            <div class="control"> <input class="input" type="text" placeholder="Cantidad" /> </div>
        </div>
        <div class="field"> <label class="label">Marca del producto</label>
            <div class="control"> <input class="input" type="text" placeholder="Marca" /> </div>
        </div>
    </div>
</body>

</html>
