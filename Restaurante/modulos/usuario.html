<!DOCTYPE html>
<html lang="en">
<head>
        <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <link rel="stylesheet" href="../css/usuario.css">
    <title>Document</title>
</head>
<body>
    <!--nombre
    apellido
    tipo de documento
    numero de documento
    telefono
    correo electronico
    genero
    cargo
    fecha de nacimiento
    contraseña-->
<<form class="formulario">

<div class="control">
    <label class="label">Nombre</label>
    <input class="input" type="text" placeholder="nombre">
</div>

<div class="control">
    <label class="label">Apellido</label>
    <input class="input" type="text" placeholder="apellido">
</div>

<div class="field">
  <label class="label">Tipo de documento</label>
  <div class="control">
    <div class="select is-fullwidth">
      <select>
        <option>C.C</option>
        <option>T.I</option>
        <option>Otro</option>
      </select>
    </div>
  </div>
</div>

<div class="control">
  <label class="label">Numero de documento</label>
  <input class="input" type="number" placeholder="numero de documento">
</div>

<label class="label">Telefono</label>
<div class="field has-addons">
  <p class="control">
    <a class="button is-static">
      +57
    </a>
  </p>

  <p class="control is-expanded">
    <input class="input" type="tel" placeholder="Tu telefono">
  </p>
</div>

<label class="label">Correo electronico</label>

<div class="field has-addons">
  <p class="control is-expanded">
    <input class="input" type="text" placeholder="tu correo">
  </p>

  <p class="control">
    <a class="button is-static">
      @gmail.com
    </a>
  </p>
</div>

<div class="field">
  <label class="label">Genero</label>

  <div class="control">
    <div class="select is-fullwidth">
      <select>
        <option>Masculino</option>
        <option>Femenino</option>
      </select>
    </div>
  </div>
</div>

<div class="control">
    <label class="label">Cargo</label>
    <input class="input" type="text" placeholder="cargo">
</div>

<div class="control">
    <label class="label">Fecha de nacimiento</label>
    <input class="input" type="date">
</div>

<div class="control">
    <label class="label">Contraseña</label>
    <input class="input" type="password" placeholder="contraseña">
</div>

<button class="button is-primary btn-registrar">
    Registrar
</button>
          <div class="field mt-5">
            <div class="control">
              <a class="button is-primary is-medium" href="../index.html">
                volver al inicio
              </a>
            </div>
          </div>

</form>

</body>
</html>
