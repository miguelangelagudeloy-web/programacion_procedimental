<!DOCTYPE html>
<html lang="en">
<head>
        <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <link rel="stylesheet" href="../css/usuario.css">
    <script src="../js/usuarios.js"></script>
    <title>Document</title>
</head>
<body>
<form class="formulario">
  <div class="field">
    <label class="label">Nombre</label>
    <div class="control">
      <input class="input" type="text" placeholder="Nombre" id="nombre">
    </div>
  </div>

  <div class="field">
    <label class="label">Apellido</label>
    <div class="control">
      <input class="input" type="text" placeholder="Apellido" id="apellido">
    </div>
  </div>

  <div class="field">
    <label class="label">Tipo de documento</label>
    <div class="control">
      <div class="select is-fullwidth">
        <select id="tipo_documento">
          <option>C.C</option>
          <option>T.I</option>
          <option>Otro</option>
        </select>
      </div>
    </div>
  </div>

  <div class="field">
    <label class="label">Número de documento</label>
    <div class="control">
      <input class="input" type="number" placeholder="Número de documento" id="numero_documento">
    </div>
  </div>

  <div class="field">
    <label class="label">Teléfono</label>
    <div class="control">
      <input class="input" type="tel" placeholder="Teléfono" id="telefono">
    </div>
  </div>

  <div class="field">
    <label class="label">Correo electrónico</label>
    <div class="control">
      <input class="input" type="email" placeholder="Correo electrónico" id="correo">
    </div>
  </div>

  <div class="field">
    <label class="label">Género</label>
    <div class="control">
      <div class="select is-fullwidth">
        <select id="genero">
          <option>Masculino</option>
          <option>Femenino</option>
          <option>Otro</option>
        </select>
      </div>
    </div>
  </div>

  <div class="field">
    <label class="label">Cargo</label>
    <div class="control">
      <input class="input" type="text" placeholder="Cargo" id="cargo">
    </div>
  </div>

  <div class="field">
    <label class="label">Fecha de nacimiento</label>
    <div class="control">
      <input class="input" type="date" id="fecha_nacimiento">
    </div>
  </div>

  <div class="field">
    <label class="label">Contraseña</label>
    <div class="control">
      <input class="input" type="password" placeholder="Contraseña" id="contrasena">
    </div>
  </div>

  <div class="field is-grouped">
    <div class="control">
      <button class="button is-primary btn-registrar" type="submit">Registrar</button>
    </div>
    <div class="control">
      <a class="button is-light btn-volver" href="../index.html">Volver al inicio</a>
    </div>
  </div>
</form>

</body>
</html>
